# tmux configuration

# Scrollback buffer
set-option -g history-limit 50000

# Mouse support (scroll with trackpad/wheel; hold Option to bypass for text selection)
set-option -g mouse on

# Use vi-style copy mode keys and make wheel-up always enter tmux scrollback.
# The tmux default sends wheel events to alternate-screen apps, which prevents
# pane history scrollback in many interactive tools.
set-option -g mode-keys vi
bind-key -n WheelUpPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X -N 3 scroll-up" \
  "copy-mode -e \\; send-keys -X -N 3 scroll-up"
bind-key -n WheelDownPane if-shell -F "#{pane_in_mode}" \
  "send-keys -X -N 3 scroll-down" \
  "send-keys -M"
