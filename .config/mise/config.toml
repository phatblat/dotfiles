[tools."http:cursor-cli"]
version = "2026.07.01-777f564"
url = "https://downloads.cursor.com/lab/2026.07.01-777f564/darwin/arm64/agent-cli-package.tar.gz"
checksum = "sha256:853979acec109c887623013623ad4dbe1f44d4cbe598ebefaa0e55145d9c993d"
bin_path = "dist-package"
bin = "cursor-agent"

[env]
# Android build + CLI tools on PATH (adb, sdkmanager, emulator, aapt/apksigner).
# mise emits these on every hook, so they survive in nushell where mise owns PATH.
# build-tools is pinned to the latest installed version — bump when SDK updates.
_.path = [
  "{{env.HOME}}/Library/Android/sdk/platform-tools",
  "{{env.HOME}}/Library/Android/sdk/cmdline-tools/latest/bin",
  "{{env.HOME}}/Library/Android/sdk/emulator",
  "{{env.HOME}}/Library/Android/sdk/build-tools/37.0.0",
]

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]
use_versions_host = false

[settings.aqua]
github_attestations = false

[settings.github]
credential_command = "gh auth token"
