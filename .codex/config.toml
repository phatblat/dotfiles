# Codex config.toml — hand-authored settings first, machine-managed state last.
# Sections/keys are alphabetized by `just format-toml` (~/scripts/sort-codex-config.py).
# Volatile churn (timestamps/revisions/hashes) is masked out of git by ~/scripts/mask-codex-state.sh (clean filter; see .gitattributes).

approvals_reviewer = "auto_review"
commit_attribution = "Co-Authored-By: Codex <noreply@openai.com>"
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
notify = ["/Users/phatblat/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]
personality = "pragmatic"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"
suppress_unstable_features_warning = true
tool_output_token_limit = 25000

[desktop]
ambient-suggestions-enabled = true
avatar-overlay-mascot-width-px = 133
codeFontSize = 14
composerEnterBehavior = "cmdIfMultiline"
conversationDetailMode = "STEPS_COMMANDS"
dock-icon-preference = "codex-system"
followUpQueueMode = "queue"
git-pull-request-merge-method = "squash"
keepRemoteControlAwakeWhilePluggedIn = true
localeOverride = "en-US"
preventSleepWhileRunning = true
selected-avatar-id = "null-signal"
usePointerCursors = true

[desktop.open-in-target-preferences]
global = "zed"

[desktop.open-in-target-preferences.perPath]
"/Users/phatblat" = "zed"

[features]
apps = false
codex_git_commit = true
collaboration_modes = true
disable_paste_burst = true
js_repl = false
multi_agent = true
personality = true
runtime_metrics = true
shell_tool = true
steer = true
unified_exec = true

[mcp_servers.code-review-graph]
args = ["exec", "pipx:code-review-graph", "--", "code-review-graph", "serve"]
command = "mise"
default_tools_approval_mode = "auto"

[mcp_servers.computer-use]
args = ["mcp"]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
cwd = "."
enabled = false

[mcp_servers.node_repl]
