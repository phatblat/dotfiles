[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.orch]
args = ["mcp", "serve"]
command = "/Users/phatblat/.worktrees/dev-agents-claude-DittoAgentOrchestrator/v1/first-run-onboarding/.venv/bin/orch"

[mcp_servers.RepoPrompt]
command = "/Users/phatblat/RepoPrompt/repoprompt_cli"
enabled = false
tool_timeout_sec = 10000.0

[otel]
exporter = { otlp-http = {
    endpoint = "https://otlp.datadoghq.com/v1/logs",
    protocol = "binary",
    headers = { "DD-API-KEY" = "${DD_API_KEY}" },
} }

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
BASH_DEFAULT_TIMEOUT_MS = "300000"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
MAX_MCP_OUTPUT_TOKENS = "25000"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "583bf903a6cfb9b00a01e1583381ce921c71d7585085c6fa6b805baa0f60230b,6d25aa7656feac858f3a3bdaea5bcbab0dbfd426c9de8e6931ce90c399ee8e4f"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/phatblat/.codex"

[tui]
status_line = ["model-with-reasoning", "current-dir", "model", "reasoning", "project-name", "git-branch"]
status_line_use_colors = true
terminal_title = ["project"]

[tui.model_availability_nux]
"gpt-5.3-codex-spark" = 4
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

