name: lint

on:
  push:
    branches: [main]
    paths:
      - ".config/fish/**"
      - ".config/home-manager/**"
      - ".config/nushell/**"
      - ".config/zsh/functions/**"
      - ".config/mise/config.toml"
      - ".gitignore"
      - "bin/**"
      - "justfile"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - ".config/fish/**"
      - ".config/home-manager/**"
      - ".config/nushell/**"
      - ".config/zsh/functions/**"
      - ".config/mise/config.toml"
      - ".gitignore"
      - "bin/**"
      - "justfile"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/lint.yml"
  schedule:
    # Weekly Monday 06:00 UTC — catch drift from tool updates
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      # Repo root IS the home directory; remap HOME so ~ resolves to checkout
      HOME: ${{ github.workspace }}
      MISE_PIN: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install mise-managed tools
        run: mise install just shellcheck ruff bats

      - name: Install fish and zsh
        run: sudo apt-get update && sudo apt-get install -y fish zsh

      - name: Install nushell
        run: |
          nu_version="0.104.0"
          curl -sSL "https://github.com/nushell/nushell/releases/download/${nu_version}/nu-${nu_version}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "nu-${nu_version}-x86_64-unknown-linux-gnu/nu"

      - name: Lint
        run: |
          eval "$(mise activate bash)"
          just lint

      - name: Validate nix flake
        run: nix flake show --json "$HOME/.config/home-manager" 2>&1 | head -20
        continue-on-error: true

  test:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      # Repo root IS the home directory; remap HOME so ~ resolves to checkout
      HOME: ${{ github.workspace }}
      MISE_PIN: "1"
      # Under the remapped HOME the repo's .gitconfig becomes the global git
      # config, and its commit.gpgsign points at an SSH key that only exists
      # on real machines — override so test fixture commits don't fail
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: commit.gpgsign
      GIT_CONFIG_VALUE_0: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: false

      - name: Install mise-managed tools
        run: mise install just shellcheck ruff bats

      - name: Install fish
        run: brew install fish

      - name: Install nushell
        run: |
          nu_version="0.104.0"
          curl -sSL "https://github.com/nushell/nushell/releases/download/${nu_version}/nu-${nu_version}-aarch64-apple-darwin.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin "nu-${nu_version}-aarch64-apple-darwin/nu"

      - name: Test
        run: |
          eval "$(mise activate bash)"
          just test
